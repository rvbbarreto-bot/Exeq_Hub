services:
  db:
    image: postgres:16-alpine
    container_name: exeq_hub_db
    environment:
      POSTGRES_DB: exeq_hub
      POSTGRES_USER: exeq
      POSTGRES_PASSWORD: exeq
    ports:
      - "5433:5432"
    volumes:
      - exeq_hub_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U exeq -d exeq_hub"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: exeq_hub_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  exeq_hub_pgdata:
