openapi: 3.0.3
info:
  title: EXEQ Hub API
  version: 4.1.0-draft
  description: |
    Auth, master data, fiscal, emissão NFS-e, billing (asaas|inter|c6),
    DAS/SERPRO, procurações e-CAC, Focus e webhooks.
servers:
  - url: http://localhost:8000/api/v1
    description: Local
security:
  - bearerAuth: []
tags:
  - name: auth
  - name: master_data
  - name: fiscal
  - name: issuance
  - name: billing
  - name: das
  - name: proxies
  - name: focus
  - name: webhooks
  - name: meta
paths:
  /openapi.json:
    get:
      tags: [meta]
      security: []
      summary: Spec OpenAPI 3 (JSON)
      responses:
        "200":
          description: Documento OpenAPI
  /auth/login:
    post:
      tags: [auth]
      security: []
      summary: Login tenant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_slug, email, password]
              properties:
                tenant_slug: { type: string }
                email: { type: string, format: email }
                password: { type: string, format: password }
      responses:
        "200":
          description: Tokens JWT
  /charges/:
    get:
      tags: [billing]
      summary: Lista cobranças
      responses:
        "200": { description: OK }
    post:
      tags: [billing]
      summary: Cria cobrança (PaymentGateway asaas|inter|c6)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChargeCreate"
      responses:
        "201": { description: registered }
  /charges/{id}/cancel:
    post:
      tags: [billing]
      summary: Cancela cobrança
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: cancelled }
  /webhooks/gateway:
    post:
      tags: [billing]
      security: []
      summary: Webhook gateway (HMAC)
      responses:
        "200": { description: inbox }
        "401": { description: assinatura inválida }
  /das/guias/:
    get:
      tags: [das]
      summary: Lista guias DAS/DARF
      responses:
        "200": { description: OK }
    post:
      tags: [das]
      summary: Emite/captura guia (Receita stub|SERPRO HTTP)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GuiaCreate"
      responses:
        "201": { description: DISPONIVEL }
        "400":
          description: |
            certificate_not_usable | electronic_proxy_not_usable |
            receita_* | duplicate_das_natural_key
  /electronic-proxies/:
    get:
      tags: [proxies]
      summary: Lista procurações e-CAC
      responses:
        "200": { description: OK }
    post:
      tags: [proxies]
      summary: Cadastra procuração eletrônica
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ElectronicProxyCreate"
      responses:
        "201": { description: Created }
  /certificates/upload:
    post:
      tags: [proxies]
      summary: Upload certificado A1 (multipart)
      responses:
        "201": { description: Created }
  /nf-issue/:
    get:
      tags: [issuance]
      summary: Lista NFS-e
      responses:
        "200": { description: OK }
    post:
      tags: [issuance]
      summary: Cria emissão (idempotente)
      responses:
        "201": { description: Created }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ChargeCreate:
      type: object
      required: [idempotency_key, customer_id, amount_cents, due_date]
      properties:
        idempotency_key: { type: string }
        customer_id: { type: string, format: uuid }
        amount_cents: { type: integer, minimum: 1 }
        due_date: { type: string, format: date }
        description: { type: string }
        nf_issue_id: { type: string, format: uuid, nullable: true }
    GuiaCreate:
      type: object
      required: [idempotency_key, provider_id, tipo_guia, competencia]
      properties:
        idempotency_key: { type: string }
        provider_id: { type: string, format: uuid }
        tipo_guia: { type: string, enum: [DAS, DARF] }
        competencia: { type: string, pattern: "^\\d{4}-\\d{2}$" }
        versao_atual: { type: integer, minimum: 1, default: 1 }
    ElectronicProxyCreate:
      type: object
      required: [principal_cnpj, proxy_document, valid_from]
      properties:
        principal_cnpj: { type: string }
        proxy_document: { type: string }
        proxy_document_type: { type: string, enum: [cnpj, cpf] }
        ecac_service_codes:
          type: array
          items: { type: string }
        status: { type: string, enum: [pending, active, expiring, expired, revoked] }
        valid_from: { type: string, format: date }
        valid_to: { type: string, format: date, nullable: true }
        label: { type: string }
        provider_id: { type: string, format: uuid, nullable: true }
